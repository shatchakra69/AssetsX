<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AssetsX | News</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <!-- Set light/dark mode before the page paints, so there is no flash of the wrong theme -->
    <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("assetsx_theme") || "dark");</script>
    <link rel="stylesheet" href="styles.css" />
    <!-- Load Chart.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body data-page="news">
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="home.html">
          <img src="logo.svg" class="brand-mark" alt="AssetsX">
          <span class="brand-name">AssetsX</span>
        </a>
        <nav class="side-nav">
          <a class="nav-link" href="home.html"><span class="nav-icon">⌁</span><span>Home</span></a>
          <a class="nav-link" href="markets.html"><span class="nav-icon">⌁</span><span>Markets</span></a>
          <a class="nav-link" href="portfolio.html"><span class="nav-icon">▰</span><span>Portfolio</span></a>
          <a class="nav-link active" href="news.html"><span class="nav-icon">≡</span><span>News</span></a>
          <a class="nav-link" href="pro.html"><span class="nav-icon">⌙</span><span>Pro</span></a>
          <a class="nav-link" href="signin.html" data-action="logout"><span class="nav-icon">⎋</span><span>Logout</span></a>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 class="page-title">News</h1>
            <div id="header-subtitle" class="page-subtitle">Market updates</div>
          </div>
          <div class="top-actions">
            <input class="search" type="search" placeholder="Search news..." />
          </div>
        </header>

        <section class="content">
          <div class="dashboard-head compact">
            <h2>Market News</h2>
            <p>Readable updates grouped by category.</p>
          </div>

          <!-- Compact stock ticker — only shown on the news list, hidden on article detail -->
          <div id="news-ticker-strip" class="news-ticker-strip">
            <!-- Filled by main.js -->
          </div>

          <!-- Category filter tabs -->
          <div class="range-tabs news-tabs" id="news-category-tabs">
            <span class="pill active" data-category="all">Trending</span>
            <span class="pill" data-category="macro">Macro</span>
            <span class="pill" data-category="tech">Tech</span>
            <span class="pill" data-category="crypto">Crypto</span>
          </div>

          <!-- News articles — filled by main.js -->
          <div id="news-grid" class="news-grid two">
            <!-- Filled by main.js -->
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
