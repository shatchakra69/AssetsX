<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AssetsX | Markets</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <!-- Set light/dark mode before the page paints, so there is no flash of the wrong theme -->
    <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("assetsx_theme") || "dark");</script>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  </head>
  <body data-page="markets">
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="home.html">
          <img src="logo.svg" class="brand-mark" alt="AssetsX">
          <span class="brand-name">AssetsX</span>
        </a>
        <nav class="side-nav">
          <a class="nav-link" href="home.html"><span class="nav-icon">⌁</span><span>Home</span></a>
          <a class="nav-link active" href="markets.html"><span class="nav-icon">⌁</span><span>Markets</span></a>
          <a class="nav-link" href="portfolio.html"><span class="nav-icon">▰</span><span>Portfolio</span></a>
          <a class="nav-link" href="news.html"><span class="nav-icon">≡</span><span>News</span></a>
          <a class="nav-link" href="pro.html"><span class="nav-icon">⌙</span><span>Pro</span></a>
          <a class="nav-link" href="signin.html" data-action="logout"><span class="nav-icon">⎋</span><span>Logout</span></a>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 class="page-title">Markets</h1>
            <div id="header-subtitle" class="page-subtitle">Loading market context...</div>
          </div>
          <div class="top-actions">
            <input class="search" type="search" placeholder="Search..." />
          </div>
        </header>

        <section class="content">
          <div class="dashboard-head compact">
            <h2>Live Market Prices</h2>
            <p>Track current prices with real-time green and red market states.</p>
          </div>

          <!-- Search box and region filter pills -->
          <div class="filter-bar">
            <input class="market-search" type="search" placeholder="Search symbol, company, or country..." />
            <div class="range-tabs" id="market-region-tabs">
              <span class="pill active" data-region="all">All Markets</span>
              <span class="pill" data-region="americas">Americas</span>
              <span class="pill" data-region="europe">Europe</span>
              <span class="pill" data-region="asia">Asia-Pacific</span>
            </div>
          </div>

          <!-- Live stock prices table -->
          <article class="card table-card">
            <table class="market-table">
              <thead>
                <tr>
                  <th class="watch-col" aria-label="Watchlist"></th>
                  <th>Symbol</th>
                  <th>Company</th>
                  <th>Country</th>
                  <th>Price</th>
                  <th>Change</th>
                  <th>Volume</th>
                  <th>Trend</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="market-table-body">
                <!-- Filled by main.js -->
              </tbody>
            </table>
          </article>
        </section>
      </main>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
