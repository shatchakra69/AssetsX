<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AssetsX | Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <!-- Set light/dark mode before the page paints, so there is no flash of the wrong theme -->
    <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("assetsx_theme") || "dark");</script>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body data-page="portfolio">
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="home.html">
          <img src="logo.svg" class="brand-mark" alt="AssetsX">
          <span class="brand-name">AssetsX</span>
        </a>
        <nav class="side-nav">
          <a class="nav-link" href="home.html"><span class="nav-icon">⌁</span><span>Home</span></a>
          <a class="nav-link" href="markets.html"><span class="nav-icon">⌁</span><span>Markets</span></a>
          <a class="nav-link active" href="portfolio.html"><span class="nav-icon">▰</span><span>Portfolio</span></a>
          <a class="nav-link" href="news.html"><span class="nav-icon">≡</span><span>News</span></a>
          <a class="nav-link" href="pro.html"><span class="nav-icon">⌙</span><span>Pro</span></a>
          <a class="nav-link" href="signin.html" data-action="logout"><span class="nav-icon">⎋</span><span>Logout</span></a>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 class="page-title">Portfolio</h1>
            <div id="header-subtitle" class="page-subtitle">Loading...</div>
          </div>
          <div class="top-actions">
            <input class="search" type="search" placeholder="Search holdings..." />
          </div>
        </header>

        <section class="content">
          <!-- Portfolio summary card — filled by main.js -->
          <section class="card portfolio-summary" id="portfolio-summary">
            <!-- Filled by main.js -->
          </section>

          <section class="portfolio-grid">
            <!-- Asset allocation donut chart -->
            <article class="card allocation-card">
              <h3>Asset Allocation</h3>
              <div class="allocation-donut-wrap">
                <canvas id="allocationChart"></canvas>
              </div>
              <div id="allocation-legend" class="allocation-legend">
                <!-- Filled by main.js -->
              </div>
            </article>

            <!-- Holdings list -->
            <article class="card holdings-card">
              <div class="card-head">
                <h3>Current Holdings</h3>
                <a href="markets.html">View all</a>
              </div>
              <div class="holdings-table">
                <div class="holdings-row holdings-head">
                  <span>Asset</span>
                  <span class="col">Avg Cost</span>
                  <span class="col">Price</span>
                  <span class="col">Value</span>
                  <span class="col">Trend</span>
                  <span class="col">Gain</span>
                  <span class="col"></span>
                </div>
                <div id="holdings-container">
                  <!-- Filled by main.js -->
                </div>
              </div>
              <div class="portfolio-actions">
                <button class="btn" data-action="sell">Sell</button>
                <button class="btn primary" data-action="buy">Buy</button>
              </div>
            </article>
          </section>
        </section>
      </main>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
