<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AssetsX | Trade</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <!-- Set light/dark mode before the page paints, so there is no flash of the wrong theme -->
    <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("assetsx_theme") || "dark");</script>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  </head>
  <body data-page="trade">
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="home.html">
          <img src="logo.svg" class="brand-mark" alt="AssetsX">
          <span class="brand-name">AssetsX</span>
        </a>
        <nav class="side-nav">
          <a class="nav-link" href="home.html"><span class="nav-icon">⌁</span><span>Home</span></a>
          <a class="nav-link" href="markets.html"><span class="nav-icon">⌁</span><span>Markets</span></a>
          <a class="nav-link" href="portfolio.html"><span class="nav-icon">▰</span><span>Portfolio</span></a>
          <a class="nav-link" href="news.html"><span class="nav-icon">≡</span><span>News</span></a>
          <a class="nav-link" href="pro.html"><span class="nav-icon">⌙</span><span>Pro</span></a>
          <a class="nav-link" href="signin.html" data-action="logout"><span class="nav-icon">⎋</span><span>Logout</span></a>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 class="page-title" id="trade-page-title">Place Order</h1>
            <div id="header-subtitle" class="page-subtitle">Simulated trading</div>
          </div>
          <div class="top-actions">
            <input class="search" type="search" placeholder="Search..." />
          </div>
        </header>

        <section class="content">
          <!-- Filled by renderTradePage() in pages.js -->
          <div id="trade-page-content"></div>
        </section>
      </main>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
