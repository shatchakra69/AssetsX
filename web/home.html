<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AssetsX | Home</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <!-- Set light/dark mode before the page paints, so there is no flash of the wrong theme -->
    <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("assetsx_theme") || "dark");</script>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body data-page="home">
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="home.html">
          <img src="logo.svg" class="brand-mark" alt="AssetsX">
          <span class="brand-name">AssetsX</span>
        </a>
        <nav class="side-nav">
          <a class="nav-link active" href="home.html"><span class="nav-icon">⌁</span><span>Home</span></a>
          <a class="nav-link" href="markets.html"><span class="nav-icon">⌁</span><span>Markets</span></a>
          <a class="nav-link" href="portfolio.html"><span class="nav-icon">▰</span><span>Portfolio</span></a>
          <a class="nav-link" href="news.html"><span class="nav-icon">≡</span><span>News</span></a>
          <a class="nav-link" href="pro.html"><span class="nav-icon">⌙</span><span>Pro</span></a>
          <a class="nav-link" href="signin.html" data-action="logout"><span class="nav-icon">⎋</span><span>Logout</span></a>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 class="page-title">Home</h1>
            <div id="header-subtitle" class="page-subtitle">Loading market context...</div>
          </div>
          <div class="top-actions">
            <input class="search" type="search" placeholder="Search..." />
          </div>
        </header>

        <section class="content">
          <div class="dashboard-head">
            <h2 id="greeting-text">Welcome back</h2>
            <p id="greeting-sub">Markets are open, here's your overview</p>
          </div>

          <!-- Metric summary cards — filled by main.js -->
          <div id="metrics-container" class="metrics-grid"></div>

          <div class="dashboard-grid">
            <!-- Featured stock chart -->
            <article class="card chart-card">
              <div class="card-head">
                <h3>AAPL Overview</h3>
                <div class="range-tabs">
                  <span class="pill active">1M</span>
                </div>
              </div>
              <div class="chart-container">
                <canvas id="homeChart" class="chart"></canvas>
              </div>
            </article>

            <!-- Watchlist with live prices -->
            <aside class="card watchlist">
              <h3>Watchlist</h3>
              <div id="watchlist-container">
                <!-- Filled by main.js -->
              </div>
            </aside>
          </div>

          <!-- Recent news articles -->
          <div id="news-container" class="news-grid"></div>
        </section>
      </main>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
